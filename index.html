<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Pat Naptár</title>

</head>
<body>
    <div id="login-screen">
        <h2>Üdvözöllek! Add meg a neved:</h2>

    </div>

    <script src="script.js"></script>
</body>
</html>
